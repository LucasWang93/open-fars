knowledge:
  paper_pool_dir: "paper_pool"
  kg_db_path: "artifacts/knowledge.db"

  collection:
    source: "huggingface"
    keywords:
      - "gui agent"
      - "web navigation"
      - "action planning"
      - "visual grounding"
      - "Mind2Web"
      - "WebArena"
      - "screen understanding"
      - "UI automation"
      - "multimodal agent"
      - "web agent"
      - "GUI grounding"
      - "computer use"
    max_papers: 200
    days_lookback: 180

  extraction:
    max_units_per_paper: 10
    min_confidence: 0.5
    categories:
      - "grounding"
      - "action_prediction"
      - "training_strategy"
      - "prompt_design"
      - "data_augmentation"
      - "evaluation"
      - "architecture"
      - "other"

  patterns:
    min_evidence_count: 2
    max_components: 4
    top_k_retrieval: 5
